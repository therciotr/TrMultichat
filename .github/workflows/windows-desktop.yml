name: Windows Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "trmultichat/mobile_flutter/**"
      - ".github/workflows/windows-desktop.yml"

jobs:
  build_windows:
    name: Build Windows App
    runs-on: windows-latest
    defaults:
      run:
        working-directory: trmultichat/mobile_flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve app metadata
        id: metadata
        shell: pwsh
        run: |
          $versionLine = Get-Content pubspec.yaml | Where-Object { $_ -match '^version:\s*' } | Select-Object -First 1
          if (-not $versionLine) {
            throw "Could not resolve version from pubspec.yaml"
          }
          $appVersion = ($versionLine -replace '^version:\s*', '').Trim()
          $appVersion = $appVersion -replace '\+', '-'
          $zipName = "trmultichat_mobile_windows_$appVersion.zip"
          $artifactName = "desktop-windows-$appVersion-run-$env:GITHUB_RUN_NUMBER"
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip Windows release folder
        shell: pwsh
        run: |
          $source = "build/windows/x64/runner/Release"
          if (!(Test-Path $source)) {
            throw "Windows release output not found at $source"
          }
          $zipPath = "build/windows/x64/runner/${{ steps.metadata.outputs.zip_name }}"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$source/*" -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: trmultichat/mobile_flutter/build/windows/x64/runner/${{ steps.metadata.outputs.zip_name }}
          if-no-files-found: error
